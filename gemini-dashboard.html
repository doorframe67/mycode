<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankDash | Secure Banking</title>
    <link rel="stylesheet" href="gemini-dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">Bank<span>Dash</span></div>
            <nav>
                <a href="#" class="active">Overview</a>
                <a href="#">Transactions</a>
                <a href="#">Accounts</a>
                <a href="#">Security</a>
            </nav>
            <div class="user-profile">
                <p>Welcome, <strong>Alex Doe</strong></p>
                <button class="logout-btn">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <h1>Dashboard Overview</h1>
                <div class="date-display" id="current-date"></div>
            </header>

            <section class="stats-grid">
                <div class="card balance">
                    <h3>Total Balance</h3>
                    <p class="amount">$24,500.00</p>
                    <span class="trend positive">+2.4% this month</span>
                </div>
                <div class="card savings">
                    <h3>Savings</h3>
                    <p class="amount">$8,120.45</p>
                </div>
                <div class="card rewards">
                    <h3>Points</h3>
                    <p class="amount">12,400</p>
                </div>
            </section>

            <section class="activity-section">
                <h2>Recent Transactions</h2>
                <table class="transaction-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="transaction-body">
                        </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="gemini-dashboard.js"></script>
</body>
</html>
